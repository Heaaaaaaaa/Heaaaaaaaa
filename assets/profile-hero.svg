<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Heaaaa profile banner</title>
  <desc id="desc">A dark editorial banner for a GitHub profile with machine learning, actuarial science, and automation themes.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="20" x2="1540" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081120"/>
      <stop offset="0.56" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="accent" x1="112" y1="94" x2="1460" y2="468" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.48" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0B1220" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.82"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" stroke="#2A3653" stroke-opacity="0.28" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.05 0 1 0 0 0.55 0 0 1 0 0.5 0 0 0 0.52 0"/>
    </filter>
  </defs>

  <rect width="1600" height="560" rx="36" fill="url(#bg)"/>
  <rect width="1600" height="560" rx="36" fill="url(#grid)" opacity="0.9"/>

  <circle cx="1400" cy="110" r="104" fill="#14B8A6" fill-opacity="0.18" filter="url(#glow)"/>
  <circle cx="1320" cy="448" r="156" fill="#38BDF8" fill-opacity="0.08" filter="url(#glow)"/>
  <path d="M74 430C220 364 356 340 520 352C660 362 748 392 890 390C1048 388 1160 322 1322 272C1418 242 1488 228 1546 228" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" opacity="0.62"/>
  <path d="M92 146C216 100 334 82 462 88C608 94 720 140 860 148C1016 158 1090 102 1254 90C1356 82 1454 98 1512 114" stroke="#8DDCF5" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 10" opacity="0.26"/>

  <rect x="86" y="84" width="928" height="392" rx="30" fill="url(#panel)" stroke="#27344D" stroke-opacity="0.84"/>
  <rect x="1048" y="84" width="468" height="392" rx="30" fill="#07111E" fill-opacity="0.88" stroke="#27344D" stroke-opacity="0.84"/>

  <text x="126" y="172" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="78" font-weight="800" letter-spacing="4">HEAAAA</text>
  <text x="128" y="224" fill="#D7E7F2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="30" font-weight="500" letter-spacing="0.5">Actuarial Science student, machine learning learner, and builder of useful little systems.</text>
  <text x="128" y="278" fill="#9FB2C7" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="400">I like turning foggy ideas into things that can be opened, run, and understood.</text>

  <g transform="translate(128 322)">
    <rect x="0" y="0" width="136" height="38" rx="19" fill="#0F766E" fill-opacity="0.30" stroke="#14B8A6" stroke-opacity="0.55"/>
    <text x="68" y="25" text-anchor="middle" fill="#D9FEF8" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">NEWS</text>

    <rect x="150" y="0" width="184" height="38" rx="19" fill="#0F172A" fill-opacity="0.8" stroke="#38BDF8" stroke-opacity="0.45"/>
    <text x="242" y="25" text-anchor="middle" fill="#D7E7F2" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">AUTOMATION</text>

    <rect x="348" y="0" width="158" height="38" rx="19" fill="#0F172A" fill-opacity="0.8" stroke="#F59E0B" stroke-opacity="0.45"/>
    <text x="427" y="25" text-anchor="middle" fill="#FFF0C9" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">TYPST</text>

    <rect x="520" y="0" width="222" height="38" rx="19" fill="#0F172A" fill-opacity="0.8" stroke="#A78BFA" stroke-opacity="0.45"/>
    <text x="631" y="25" text-anchor="middle" fill="#ECE5FF" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">ML + ACTUARIAL SCIENCE</text>
  </g>

  <text x="1092" y="138" fill="#A8C5D8" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">/ current focus</text>
  <text x="1092" y="182" fill="#EAF4FB" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="700">a quieter way to build</text>

  <g transform="translate(1092 214)">
    <rect width="360" height="48" rx="16" fill="#0F172A" fill-opacity="0.72" stroke="#24334D"/>
    <text x="20" y="30" fill="#D7E7F2" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">- cleaner prompts</text>

    <rect y="58" width="360" height="48" rx="16" fill="#0F172A" fill-opacity="0.72" stroke="#24334D"/>
    <text x="20" y="88" fill="#D7E7F2" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">- readable study systems</text>

    <rect y="116" width="360" height="48" rx="16" fill="#0F172A" fill-opacity="0.72" stroke="#24334D"/>
    <text x="20" y="146" fill="#D7E7F2" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">- source-grounded automation</text>

    <rect y="174" width="360" height="48" rx="16" fill="#0F172A" fill-opacity="0.72" stroke="#24334D"/>
    <text x="20" y="204" fill="#D7E7F2" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">- tools that survive real use</text>
  </g>

  <text x="126" y="478" fill="#7DA1BB" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">github profile banner / built for readability, not noise</text>
</svg>
